<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>I Love You</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*,*::after,*::before{padding:0;margin:0;box-sizing:border-box}

:root{
  --dark-color:#0a0010;
  --petal-1:#ff6eb4;
  --petal-2:#ff4499;
  --petal-grad-top:#ffb3d9;
  --petal-grad-bot:#e0407a;
  --stem-color:#8b1a4a;
  --stem-dark:#5c0f32;
  --glow-color:#ff69b4;
  --leaf-color:#2d6e3e;
  --leaf-light:#4caf6a;
  --light-1:#fffb00;
  --light-2:#ff69b4;
  /* Golden flower vars */
  --gold-petal-1:#ffd700;
  --gold-petal-2:#ffb300;
  --gold-petal-grad-top:#ffe066;
  --gold-petal-grad-bot:#c87a00;
  --gold-stem:#7a5200;
  --gold-stem-dark:#4a3000;
  --gold-glow:#ffd700;
  --gold-center:#fff8dc;
}

html{
  font-size:clamp(12px,2vw,16px);
}

body{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  min-height:100vh;
  background-color:var(--dark-color);
  overflow:hidden;
  perspective:1000px;
}

/* ─── STARS ─── */
.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}
.star{
  position:absolute;
  border-radius:50%;
  background:#fff;
  animation:twinkle var(--dur,3s) var(--d,0s) ease-in-out infinite alternate;
}
@keyframes twinkle{
  0%{opacity:.15;transform:scale(1)}
  100%{opacity:.9;transform:scale(1.4)}
}

/* ─── MOON ─── */
.moon{
  position:fixed;
  top:6vh;
  right:10vw;
  width:clamp(45px,7vw,70px);
  height:clamp(45px,7vw,70px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff9e0,#ffd97a 60%,#c8941e);
  box-shadow:0 0 30px 10px rgba(255,220,100,.35),0 0 80px 30px rgba(255,200,50,.15);
  animation:moonFloat 8s ease-in-out infinite;
  z-index:1;
}
.moon::after{
  content:'';
  position:absolute;
  top:12px;right:12px;
  width:15px;height:15px;
  border-radius:50%;
  background:rgba(180,130,0,.25);
  box-shadow:0 22px 0 10px rgba(160,110,0,.18),18px 30px 0 5px rgba(160,110,0,.12);
}
@keyframes moonFloat{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-12px) rotate(3deg)}
}

/* ─── FALLING PETALS ─── */
.petal-fall{
  position:fixed;
  top:-40px;
  width:12px;
  height:16px;
  border-radius:50% 0 50% 0;
  opacity:.7;
  animation:petalDrop var(--pt,8s) var(--pd,0s) linear infinite;
  z-index:200;
  pointer-events:none;
}
@keyframes petalDrop{
  0%{transform:translateY(-40px) rotate(0deg) translateX(0);opacity:.8}
  25%{transform:translateY(25vh) rotate(90deg) translateX(30px);opacity:.6}
  50%{transform:translateY(50vh) rotate(180deg) translateX(-20px);opacity:.5}
  75%{transform:translateY(75vh) rotate(270deg) translateX(20px);opacity:.3}
  100%{transform:translateY(110vh) rotate(360deg) translateX(-10px);opacity:0}
}

/* ─── MESSAGE ─── */
.message-wrap{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:4vh;
  z-index:150;
  pointer-events:none;
}
.message-line{
  font-family:'Great Vibes',cursive;
  color:#fff;
  letter-spacing:.08em;
  line-height:1.15;
  text-align:center;
  animation:msgReveal 3s 1.5s both;
}
.message-line:nth-child(1){
  font-size:clamp(2.8rem,10vw,7rem);
  text-shadow:
    0 0 30px rgba(255,105,180,.9),
    0 0 60px rgba(255,105,180,.6),
    0 0 120px rgba(255,50,130,.4),
    0 2px 8px rgba(0,0,0,.5);
}
.message-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1rem,4vw,3rem);
  font-style:italic;
  font-weight:300;
  color:rgba(255,200,220,.85);
  letter-spacing:.35em;
  margin-top:.5rem;
  text-shadow:0 0 20px rgba(255,100,180,.5);
  animation:msgReveal 3s 2.4s both;
}
.message-ornament{
  margin-top:.6rem;
  display:flex;
  align-items:center;
  gap:1rem;
  animation:msgReveal 3s 3s both;
}
.message-ornament span{
  width:clamp(30px,8vw,60px);
  height:1px;
  background:linear-gradient(to right,transparent,rgba(255,180,210,.6));
}
.message-ornament span:last-child{
  background:linear-gradient(to left,transparent,rgba(255,180,210,.6));
}
.message-ornament .heart{
  font-size:clamp(.75rem,2vw,1rem);
  color:#ff69b4;
  filter:drop-shadow(0 0 6px rgba(255,105,180,.9));
  animation:heartbeat 1.2s ease-in-out infinite;
}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}
  30%{transform:scale(1.25)}
  60%{transform:scale(1.05)}
}
@keyframes msgReveal{
  0%{opacity:0;transform:translateY(20px)}
  100%{opacity:1;transform:translateY(0)}
}

/* ─── NIGHT BG ─── */
.night{
  position:fixed;
  left:50%;top:0;
  transform:translateX(-50%);
  width:100%;height:100%;
  filter:blur(.1vmin);
  background-image:
    radial-gradient(ellipse at top,transparent 0%,var(--dark-color)),
    radial-gradient(ellipse at bottom,var(--dark-color),rgba(120,0,60,.25)),
    repeating-linear-gradient(220deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
    repeating-linear-gradient(189deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
    repeating-linear-gradient(148deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
    linear-gradient(90deg,rgb(140,0,100),rgb(60,0,40));
  z-index:0;
}

/* ─── FLOWERS CONTAINER ─── */
.flowers{
  position:relative;
  z-index:10;
}

/* ─── SCALE WRAPPER ─── */
@media (max-width:480px){
  .flowers{ transform:scale(.52) translateY(8vmin); transform-origin:bottom center; }
}
@media (min-width:481px) and (max-width:768px){
  .flowers{ transform:scale(.68) translateY(4vmin); transform-origin:bottom center; }
}
@media (min-width:769px) and (max-width:1024px){
  .flowers{ transform:scale(.82); transform-origin:bottom center; }
}
@media (min-width:1025px){
  .flowers{ transform:scale(.9); transform-origin:bottom center; }
}

.flower{
  position:absolute;
  bottom:10vmin;
  transform-origin:bottom center;
  z-index:10;
  --fl-speed:.8s;
}
.flower--1{animation:moving-flower-1 4s linear infinite}
.flower--2{left:50%;transform:rotate(20deg);animation:moving-flower-2 4s linear infinite}
.flower--3{left:50%;transform:rotate(-15deg);animation:moving-flower-3 4s linear infinite}
/* NEW PINK flower--4 */
.flower--4{left:-45%;transform:rotate(-22deg);animation:moving-flower-4 4.5s linear infinite}
/* GOLDEN flowers */
.flower--gold-1{left:-80%;transform:rotate(10deg);animation:moving-flower-gold1 5s linear infinite}
.flower--gold-2{left:80%;transform:rotate(-8deg);animation:moving-flower-gold2 4.8s linear infinite}
.flower--gold-3{left:110%;transform:rotate(14deg);animation:moving-flower-gold3 5.2s linear infinite}

@keyframes moving-flower-4{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(-26deg) rotateY(-10deg)}}
@keyframes moving-flower-gold1{0%,100%{transform:rotate(10deg)}50%{transform:rotate(7deg)}}
@keyframes moving-flower-gold2{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(-5deg) rotateY(10deg)}}
@keyframes moving-flower-gold3{0%,100%{transform:rotate(14deg)}50%{transform:rotate(11deg)}}

/* leafs */
.flower__leafs{
  position:relative;
  animation:blooming-flower 2s backwards;
}
.flower__leafs--1{animation-delay:1.1s}
.flower__leafs--2{animation-delay:1.4s}
.flower__leafs--3{animation-delay:1.7s}
.flower__leafs--4{animation-delay:2s}
.flower__leafs--gold{animation-delay:2.2s}
.flower__leafs::after{
  content:'';
  position:absolute;
  left:0;top:0;
  transform:translate(-50%,-100%);
  width:8vmin;height:8vmin;
  background-color:#ff69b4;
  filter:blur(10vmin);
}
.flower__leafs--gold::after{
  background-color:#ffd700;
}

.flower__leaf{
  position:absolute;
  bottom:0;left:50%;
  width:8vmin;height:11vmin;
  border-radius:51% 49% 47% 53% / 44% 45% 55% 69%;
  background-color:var(--petal-1);
  background-image:linear-gradient(to top,var(--petal-grad-bot),var(--petal-grad-top));
  transform-origin:bottom center;
  opacity:.9;
  box-shadow:inset 0 0 2vmin rgba(255,255,255,.5);
}
.flower__leaf--1{transform:translate(-10%,1%) rotateY(40deg) rotateX(-50deg)}
.flower__leaf--2{transform:translate(-50%,-4%) rotateX(40deg)}
.flower__leaf--3{transform:translate(-90%,0%) rotateY(45deg) rotateX(50deg)}
.flower__leaf--4{
  width:8vmin;height:8vmin;
  transform-origin:bottom left;
  border-radius:4vmin 10vmin 4vmin 4vmin;
  transform:translate(-0%,18%) rotateX(70deg) rotate(-43deg);
  background-image:linear-gradient(to top,#c0305a,var(--petal-grad-top));
  z-index:1;opacity:.8;
}

/* ── Golden leaf style ── */
.flower__leaf--gold{
  background-color:var(--gold-petal-1);
  background-image:linear-gradient(to top,var(--gold-petal-grad-bot),var(--gold-petal-grad-top));
  box-shadow:inset 0 0 2vmin rgba(255,255,200,.6), 0 0 6px rgba(255,215,0,.4);
}
.flower__leaf--gold.flower__leaf--4{
  background-image:linear-gradient(to top,#a06000,var(--gold-petal-grad-top));
}

.flower__white-circle{
  position:absolute;
  left:-3.5vmin;top:-3vmin;
  width:9vmin;height:4vmin;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 8px 2px rgba(255,220,230,.8);
}
.flower__white-circle--gold{
  background:#fffde0;
  box-shadow:0 0 10px 3px rgba(255,230,100,.9);
}
.flower__white-circle::after,
.flower__white-circle--gold::after{
  content:'';
  position:absolute;
  left:50%;top:45%;
  transform:translate(-50%,-50%);
  width:60%;height:60%;
  border-radius:inherit;
  background-image:linear-gradient(90deg,rgb(255,230,50),rgb(255,200,0));
}
.flower__white-circle--gold::after{
  background-image:linear-gradient(90deg,rgb(255,240,80),rgb(255,180,0));
}

/* stems */
.flower__line{
  height:55vmin;
  width:1.5vmin;
  background-image:
    linear-gradient(to left,rgba(0,0,0,.2),transparent,rgba(255,255,255,.2)),
    linear-gradient(to top,transparent 10%,var(--stem-dark),var(--stem-color));
  box-shadow:inset 0 0 2px rgba(0,0,0,.5);
  animation:grow-flower-tree 4s backwards;
}
.flower--1 .flower__line{height:70vmin;animation-delay:.3s}
.flower--2 .flower__line{height:60vmin;animation-delay:.6s}
.flower--3 .flower__line{animation-delay:.9s}
.flower--4 .flower__line{height:62vmin;animation-delay:1.2s}

/* Golden stems */
.flower__line--gold{
  background-image:
    linear-gradient(to left,rgba(0,0,0,.2),transparent,rgba(255,255,200,.3)),
    linear-gradient(to top,transparent 10%,var(--gold-stem-dark),var(--gold-stem));
}
.flower--gold-1 .flower__line{height:65vmin;animation-delay:1.5s}
.flower--gold-2 .flower__line{height:58vmin;animation-delay:1.8s}
.flower--gold-3 .flower__line{height:72vmin;animation-delay:2.1s}

.flower__line__leaf{
  --w:7vmin;
  --h:calc(var(--w) + 2vmin);
  position:absolute;
  top:20%;left:90%;
  width:var(--w);height:var(--h);
  border-top-right-radius:var(--h);
  border-bottom-left-radius:var(--h);
  background-image:linear-gradient(to top,rgba(80,30,50,.4),var(--stem-color));
}
.flower__line__leaf--gold{
  background-image:linear-gradient(to top,rgba(80,50,0,.4),var(--gold-stem));
}
.flower__line__leaf--1{transform:rotate(70deg) rotateY(30deg);animation:blooming-leaf-right var(--fl-speed) 1.6s backwards}
.flower__line__leaf--2{top:45%;transform:rotate(70deg) rotateY(30deg);animation:blooming-leaf-right var(--fl-speed) 1.4s backwards}
.flower__line__leaf--3,.flower__line__leaf--4,.flower__line__leaf--6{
  border-top-right-radius:0;border-bottom-left-radius:0;
  border-top-left-radius:var(--h);border-bottom-right-radius:var(--h);
  left:-460%;top:12%;
  transform:rotate(-70deg) rotateY(30deg);
}
.flower__line__leaf--3{animation:blooming-leaf-left var(--fl-speed) 1.2s backwards}
.flower__line__leaf--4{top:40%;animation:blooming-leaf-left var(--fl-speed) 1s backwards}
.flower__line__leaf--5{top:0;transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(.6);animation:blooming-leaf-right var(--fl-speed) 1.8s backwards}
.flower__line__leaf--6{top:-2%;left:-450%;transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(.6);animation:blooming-leaf-left var(--fl-speed) 2s backwards}

.flower--2 .flower__line__leaf--1{animation:blooming-leaf-right var(--fl-speed) 1.9s backwards}
.flower--2 .flower__line__leaf--2{top:45%;animation:blooming-leaf-right var(--fl-speed) 1.7s backwards}
.flower--2 .flower__line__leaf--3{animation:blooming-leaf-left var(--fl-speed) 1.5s backwards}
.flower--2 .flower__line__leaf--4{top:40%;animation:blooming-leaf-left var(--fl-speed) 1.3s backwards}

.flower--3 .flower__line__leaf--1{animation:blooming-leaf-right var(--fl-speed) 2.5s backwards}
.flower--3 .flower__line__leaf--2{top:45%;animation:blooming-leaf-right var(--fl-speed) 2.3s backwards}
.flower--3 .flower__line__leaf--3{animation:blooming-leaf-left var(--fl-speed) 2.1s backwards}
.flower--3 .flower__line__leaf--4{top:40%;animation:blooming-leaf-left var(--fl-speed) 1.9s backwards}

.flower--4 .flower__line__leaf--1{animation:blooming-leaf-right var(--fl-speed) 2.2s backwards}
.flower--4 .flower__line__leaf--2{top:45%;animation:blooming-leaf-right var(--fl-speed) 2s backwards}
.flower--4 .flower__line__leaf--3{animation:blooming-leaf-left var(--fl-speed) 1.8s backwards}
.flower--4 .flower__line__leaf--4{top:40%;animation:blooming-leaf-left var(--fl-speed) 1.6s backwards}

.flower--gold-1 .flower__line__leaf--1{animation:blooming-leaf-right var(--fl-speed) 2.4s backwards}
.flower--gold-1 .flower__line__leaf--2{top:45%;animation:blooming-leaf-right var(--fl-speed) 2.2s backwards}
.flower--gold-1 .flower__line__leaf--3{animation:blooming-leaf-left var(--fl-speed) 2s backwards}
.flower--gold-1 .flower__line__leaf--4{top:40%;animation:blooming-leaf-left var(--fl-speed) 1.8s backwards}

.flower--gold-2 .flower__line__leaf--1{animation:blooming-leaf-right var(--fl-speed) 2.6s backwards}
.flower--gold-2 .flower__line__leaf--2{top:45%;animation:blooming-leaf-right var(--fl-speed) 2.4s backwards}
.flower--gold-2 .flower__line__leaf--3{animation:blooming-leaf-left var(--fl-speed) 2.2s backwards}
.flower--gold-2 .flower__line__leaf--4{top:40%;animation:blooming-leaf-left var(--fl-speed) 2s backwards}

.flower--gold-3 .flower__line__leaf--1{animation:blooming-leaf-right var(--fl-speed) 2.8s backwards}
.flower--gold-3 .flower__line__leaf--2{top:45%;animation:blooming-leaf-right var(--fl-speed) 2.6s backwards}
.flower--gold-3 .flower__line__leaf--3{animation:blooming-leaf-left var(--fl-speed) 2.4s backwards}
.flower--gold-3 .flower__line__leaf--4{top:40%;animation:blooming-leaf-left var(--fl-speed) 2.2s backwards}

/* lights */
.flower__light{
  position:absolute;
  bottom:0;
  width:1vmin;height:1vmin;
  border-radius:50%;
  filter:blur(.2vmin);
  animation:light-ans 4s linear infinite backwards;
}
.flower__light:nth-child(odd){background-color:#ff69b4}
.flower__light:nth-child(even){background-color:#fffb00}
/* golden lights */
.flower__light--gold:nth-child(odd){background-color:#ffd700 !important}
.flower__light--gold:nth-child(even){background-color:#fff8a0 !important}

.flower__light--1{left:-2vmin;animation-delay:1s}
.flower__light--2{left:3vmin;animation-delay:.5s}
.flower__light--3{left:-6vmin;animation-delay:.3s}
.flower__light--4{left:6vmin;animation-delay:.9s}
.flower__light--5{left:-1vmin;animation-delay:1.5s}
.flower__light--6{left:-4vmin;animation-delay:3s}
.flower__light--7{left:3vmin;animation-delay:2s}
.flower__light--8{left:-6vmin;animation-delay:3.5s}
.flower__light--9{left:0vmin;animation-delay:4.5s;background:#ff6eb4!important;width:1.5vmin;height:1.5vmin}
.flower__light--10{left:4vmin;animation-delay:5s;background:#ff6eb4!important}

/* grass */
.flower__grass{
  --c:#8b1a4a;
  --line-w:1.5vmin;
  position:absolute;
  bottom:12vmin;left:-7vmin;
  display:flex;flex-direction:column;align-items:flex-end;
  z-index:20;
  transform-origin:bottom center;
  transform:rotate(-48deg) rotateY(40deg);
}
.flower__grass--1{animation:moving-grass 2s linear infinite}
.flower__grass--2{left:2vmin;bottom:10vmin;transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);opacity:.8;z-index:0;animation:moving-grass--2 1.5s linear infinite}
.flower__grass--top{width:7vmin;height:10vmin;border-top-right-radius:100%;border-right:var(--line-w) solid var(--c);transform-origin:bottom center;transform:rotate(-2deg)}
.flower__grass--bottom{margin-top:-2px;width:var(--line-w);height:25vmin;background-image:linear-gradient(to top,transparent,var(--c))}
.flower__grass__leaf{--size:10vmin;position:absolute;width:calc(var(--size)*2.1);height:var(--size);border-top-left-radius:var(--size);border-top-right-radius:var(--size);background-image:linear-gradient(to top,transparent,transparent 30%,var(--c));z-index:100}
.flower__grass__leaf--1{top:-6%;left:30%;--size:6vmin;transform:rotate(-20deg);animation:growing-grass-ans--1 2s 2.6s backwards}
.flower__grass__leaf--2{top:-5%;left:-110%;--size:6vmin;transform:rotate(10deg);animation:growing-grass-ans--2 2s 2.4s linear backwards}
.flower__grass__leaf--3{top:5%;left:60%;--size:8vmin;transform:rotate(-18deg) rotateX(-20deg);animation:growing-grass-ans--3 2s 2.2s linear backwards}
.flower__grass__leaf--4{top:6%;left:-135%;--size:8vmin;transform:rotate(2deg);animation:growing-grass-ans--4 2s 2s linear backwards}
.flower__grass__leaf--5{top:20%;left:60%;--size:10vmin;transform:rotate(-24deg) rotateX(-20deg);animation:growing-grass-ans--5 2s 1.8s linear backwards}
.flower__grass__leaf--6{top:22%;left:-180%;--size:10vmin;transform:rotate(10deg);animation:growing-grass-ans--6 2s 1.6s linear backwards}
.flower__grass__leaf--7{top:39%;left:70%;--size:10vmin;transform:rotate(-10deg);animation:growing-grass-ans--7 2s 1.4s linear backwards}
.flower__grass__leaf--8{top:40%;left:-215%;--size:11vmin;transform:rotate(10deg);animation:growing-grass-ans--8 2s 1.2s linear backwards}
.flower__grass__overlay{position:absolute;top:-10%;right:0;width:100%;height:100%;background-color:rgba(0,0,0,.6);filter:blur(1.5vmin);z-index:100}

@keyframes growing-grass-ans--1{0%{transform-origin:bottom left;transform:rotate(-20deg) scale(0)}}
@keyframes growing-grass-ans--2{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}
@keyframes growing-grass-ans--3{0%{transform-origin:bottom left;transform:rotate(-18deg) rotateX(-20deg) scale(0)}}
@keyframes growing-grass-ans--4{0%{transform-origin:bottom right;transform:rotate(2deg) scale(0)}}
@keyframes growing-grass-ans--5{0%{transform-origin:bottom left;transform:rotate(-24deg) rotateX(-20deg) scale(0)}}
@keyframes growing-grass-ans--6{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}
@keyframes growing-grass-ans--7{0%{transform-origin:bottom left;transform:rotate(-10deg) scale(0)}}
@keyframes growing-grass-ans--8{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}

.flower__g-long{
  --w:2vmin;--h:6vmin;--c:#8b1a4a;
  position:absolute;bottom:10vmin;left:-3vmin;
  transform-origin:bottom center;
  transform:rotate(-30deg) rotateY(-20deg);
  display:flex;flex-direction:column;align-items:flex-end;
  animation:flower-g-long-ans 3s linear infinite;
}
@keyframes flower-g-long-ans{0%,100%{transform:rotate(-30deg) rotateY(-20deg)}50%{transform:rotate(-32deg) rotateY(-20deg)}}
.flower__g-long__top{top:calc(var(--h)*-1);width:calc(var(--w)+1vmin);height:var(--h);border-top-right-radius:100%;border-right:.7vmin solid var(--c);transform:translate(-.7vmin,1vmin)}
.flower__g-long__bottom{width:var(--w);height:50vmin;transform-origin:bottom center;background-image:linear-gradient(to top,transparent 30%,var(--c));box-shadow:inset 0 0 2px rgba(0,0,0,.5);clip-path:polygon(35% 0,65% 1%,100% 100%,0% 100%)}

.flower__g-right{position:absolute;bottom:6vmin;left:-2vmin;transform-origin:bottom left;transform:rotate(20deg)}

<script>
onload = () => {
  const c = setTimeout(() => {
    document.body.classList.remove("not-loaded");
    clearTimeout(c);
  }, 1000);
};

/* ─── STARS ─── */
const starsEl = document.getElementById('stars');
for(let i=0;i<140;i++){
  const s = document.createElement('div');
  s.className='star';
  const sz = Math.random()*2.5+.5;
  s.style.cssText=`
    width:${sz}px;height:${sz}px;
    top:${Math.random()*85}%;
    left:${Math.random()*100}%;
    --dur:${(Math.random()*3+2).toFixed(1)}s;
    --d:${(Math.random()*4).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

/* ─── FALLING PETALS (pink + gold) ─── */
const petalsEl = document.getElementById('petals');
const petalColors=['#ff69b4','#ff4499','#ffb3d9','#e0407a','#ff85c2','#ff1493','#ffc0cb','#ff6eb4','#ffd700','#ffe066','#ffb300','#fff59d','#ffd54f'];
for(let i=0;i<26;i++){
  const p = document.createElement('div');
  p.className='petal-fall';
  const c = petalColors[Math.floor(Math.random()*petalColors.length)];
  p.style.cssText=`
    left:${Math.random()*100}vw;
    background:${c};
    width:${Math.random()*8+7}px;
    height:${Math.random()*10+10}px;
    --pt:${(Math.random()*6+6).toFixed(1)}s;
    --pd:${(Math.random()*10).toFixed(1)}s;
    border-radius:${Math.random()>.5?'50% 0 50% 0':'0 50% 0 50%'};
    opacity:${(.4+Math.random()*.5).toFixed(2)};
    box-shadow:0 0 4px ${c}88;
  `;
  petalsEl.appendChild(p);
}
</script>
